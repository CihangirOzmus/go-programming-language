services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
      POSTGRES_DB: todo
    volumes:
      # postgres:18+ expects a single mount at /var/lib/postgresql (data lands
      # under a major-version subdirectory inside). Older tags used /data.
      - pgdata:/var/lib/postgresql
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo -d todo"]
      interval: 3s
      timeout: 3s
      retries: 20

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://todo:todo@db:5432/todo?sslmode=disable
      JWT_SECRET: change-me-in-prod
      JWT_TTL: 24h
      PORT: "8080"
    ports:
      - "8080:8080"

volumes:
  pgdata:
